<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    background: whitesmoke;
    font-family: "Poppins", sans-serif;
}


.nav{
    height: 60px;
    background: black;
    display: flex;
    align-items: center; 
    justify-content: space-between;
    padding: 0 40px;
}

.logo{
    color: white;
    font-weight: bold;
    font-size: 20px;
    animation: slideDown 1s forwards;
}

.links a{
    color: white;
    text-decoration: none;
    margin-left: 15px;
    animation: slideDown 1s forwards;
}

.links a:hover{
    background: white;
    color: black;
    padding: 5px 10px;
    border-radius: 5px;
}


.intro{
    text-align: center;
    padding: 40px;
}

.intro h1{
    font-size: 60px;
    animation: slideUp 1s forwards;
}

.intro p{
    max-width: 600px;
    margin: auto;
    animation: slideUp 1s 0.3s forwards;
}


#para1{
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 20px;
}

#para1 span{
    background: white;
    padding: 8px 14px;
    border-radius: 20px;
    transition: 0.3s;
}

#para1 span:hover{
    background: black;
    color: white;
}


.work h1{
    text-align: center;
    font-size: 60px;
    margin-top: 60px;
}

.work-section{
    width: 90%;
    margin: auto;
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 20px;
}


.work-card{
    position: relative;
    border-radius: 15px;
    overflow: hidden;
    animation: fadeIn 1s ease forwards;
}

.work-card img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: 0.4s;
}

.work-card:hover img{
    transform: scale(1.08);
}

.work-card.large{
    grid-column: span 2;
    height: 300px;
}

.work-card.small{
    height: 200px;
}

.work-overlay{
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 10px;
    color: white;
    background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
}


.footer{
    background: black;
    color: white;
    text-align: center;
    padding: 30px;
    margin-top: 60px;
}

.social-icons{
    margin-top: 10px;
}

.social-icons a{
    color: white;
    margin: 0 10px;
    font-size: 20px;
    transition: 0.3s;
}

.social-icons a:hover{
    color: #00ffcc;
    transform: scale(1.2);
}

@keyframes slideDown {
    from {opacity:0; transform:translateY(-40px);}
    to {opacity:1; transform:translateY(0);}
}

@keyframes slideUp {
    from {opacity:0; transform:translateY(40px);}
    to {opacity:1; transform:translateY(0);}
}

@keyframes fadeIn {
    from {opacity:0;}
    to {opacity:1;}
}
</style>
</head>

<body>


<nav class="nav">
    <div class="logo">SUYASH SINGH</div>
    <div class="links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </div>
</nav>


<div class="intro">
    <h1>Hi, I'M SUYASH</h1>
    <p>I build modern websites with clean UI and smooth animations.</p>

    <div id="para1">
        <span>HTML</span>
        <span>CSS</span>
        <span>Design</span>
    </div>
</div>


<div class="work">
    <h1>WORK</h1>
</div>

<div class="work-section">

    <div class="work-card large">
        <img src="https://images.unsplash.1291518857-4e27b48ff24e">
        <div class="work-overlay">Featect</div>
    </div>

    <div class="work-card small">
        <img src="https://images.unspl/photo-cd4628902d4a">
        <div class="work-overlay">UI</div>
    </div>

    <div class="work-card small">
        <img src="https://images.uns963-aa79dcee981c">
        <div class="work-overlay">rd</div>
    </div>

    <div class="work-card small">
        <img src="https://is.unsplash.co23275335684-37898b6baf30">
        <div class="work-overlay">Pr</div>
    </div>

    <div class="work-card small">
        <img src="ht://images.unspo-1511512578047-dfb367046420">
        <div class="work-overlay">Gaming UI</div>
    </div>

</div>


<footer class="footer">
    <p>© 2026 Suyash Singh  </p>

    <div class="social-icons">
        <a href="https://instagram.com/suyash_singh563" target="https://www.instagram.com/suyash_singh563/">
            <i class="fab fa-instagram"></i>
        </a>

        <a href="https://discord.com" target="">
            <i class="fab fa-discord"></i>
        </a>

        <a href="https://github.com/suyashsinghdev" target="https://github.com/suyashsinghdev">
            <i class="fab fa-github"></i>
            

        </a>
    </div>
</footer>

</body>
</html>
